name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch: # allow manual trigger from GitHub UI

concurrency:
  group: deploy
  cancel-in-progress: false # never cancel a deploy mid-flight

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      id-token: write # required for OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install CDK dependencies
        run: npm ci
        working-directory: infra/cdk

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2

      # Write .env.prod from GitHub secrets so the CDK and Vite builds pick it up
      - name: Write .env.prod
        run: |
          cat > .env.prod << 'EOF'
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY=${{ secrets.SUPABASE_SECRET_KEY }}
          TABLE_NAME=${{ secrets.TABLE_NAME }}
          APP_DOMAIN_NAME=${{ secrets.APP_DOMAIN_NAME }}
          APP_SUPPORT_EMAIL=${{ secrets.APP_SUPPORT_EMAIL }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          S3_BUCKET=${{ secrets.S3_BUCKET }}
          CF_TURNSTILE_SITE_KEY=${{ secrets.CF_TURNSTILE_SITE_KEY }}
          CF_TURNSTILE_SECRET_KEY=${{ secrets.CF_TURNSTILE_SECRET_KEY }}
          EOF

      - name: Deploy
        run: npm run deploy
