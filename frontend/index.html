<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Queensland's simple drink tracker. Log beers, track your BAC, and drink responsibly.">
    <link rel="canonical" href="https://itsbeeroclock.au/" />
    <meta property="og:title" content="Beer O'Clock" />
    <meta property="og:description" content="Queensland's simple drink tracker. Log beers, track your BAC, and drink responsibly." />
    <meta property="og:url" content="https://itsbeeroclock.au/" />
    <meta property="og:image" content="https://itsbeeroclock.au/favicon.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Beer O'Clock" />
    <meta name="twitter:description" content="Queensland's simple drink tracker. Log beers, track your BAC, and drink responsibly." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap"
      rel="preload"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <title>Beer O'Clock</title>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('vite-ui-theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
