  <body>
    <div id="root"></div>
    <noscript>
      <main style="font-family: sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px;">
        <h1>Beer O'Clock — Queensland's Free Drink Tracker</h1>
        <p>
          Beer O'Clock is a free, simple drink tracker built for Queenslanders.
          Log your pots, schooners, and pints, estimate your blood alcohol content (BAC),
          and keep track of your standard drinks across a night out.
        </p>
        <h2>Features</h2>
        <ul>
          <li>Log Queensland drink sizes: pots (285ml), schooners (425ml), and pints (570ml)</li>
          <li>BAC estimator using Watson's formula, personalised to your physiology</li>
          <li>Standard drinks counter for every beer in your session</li>
          <li>Drinking history dashboard to review past sessions</li>
          <li>Beer not in the catalogue? Add your own custom beer and its ABV%, let Beer O'Clock do the rest</li>
          <li>Privacy first, free, no ads, no tracking</li>
        </ul>
        <h2>Built for Queenslanders by Queenslanders</h2>
        <p>
          Unlike generic drink trackers, Beer O'Clock uses real Queensland pub sizes and
          Australian standard drink definitions (10g of alcohol). It's designed to be easy even
          after a few beers.
        </p>
        <p>
          <a href="https://itsbeeroclock.au">Open Beer O'Clock</a>
        </p>
      </main>
    </noscript>
